{% extends 'base.html' %}

{% block content %}

<h2>Mock Stripe Payment</h2>

<p>Order #{{ order.id }}</p>

<p>Total: ₹{{ order.total }}</p>

<form method="POST">
    {% csrf_token %}

    <label>Card Number</label><br>
    <input
        type="text"
        name="card_number"
        placeholder="4242 4242 4242 4242"
        required
    ><br><br>

    <label>Expiry</label><br>
    <input
        type="text"
        name="expiry"
        placeholder="12/34"
    ><br><br>

    <label>CVV</label><br>
    <input
        type="text"
        name="cvv"
        placeholder="123"
    ><br><br>

    <button type="submit">
        Pay Now
    </button>
</form>

{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Mini Store Login</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f4f4;
        }

        .header{
            background:#417690;
            color:white;
            padding:15px;
            text-align:center;
        }

        .login-box{
            width:400px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        button{
            background:#417690;
            color:white;
            border:none;
            padding:10px 15px;
            width:100%;
            cursor:pointer;
        }

        button:hover{
            background:#2f5b73;
        }

        .home-link{
            display:block;
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>
<body>

<div class="header">
    <h1>Mini E-Commerce Store</h1>
</div>

<div class="login-box">

    <h2>Login</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Login
        </button>

    </form>

    <a class="home-link" href="/">
        Back to Home
    </a>

</div>

</body>
</html>

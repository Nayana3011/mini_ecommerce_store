<!DOCTYPE html>
<html>
<head>
    <title>Mini Store</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f8f8f8;
        }

        .header{
            background:#417690;
            color:white;
            padding:15px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header a{
            color:white;
            text-decoration:none;
            margin-left:10px;
        }

        .sidebar{
            width:220px;
            background:#2c3e50;
            height:100vh;
            float:left;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px;
        }

        .sidebar a:hover{
            background:#34495e;
        }

        .content{
            margin-left:220px;
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:5px;
            margin-bottom:15px;
        }

        .btn{
            background:#28a745;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:4px;
        }

        .btn{
            background:#28a745;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }

        .btn:hover{
            background:#218838;
        }
        
        .btn-danger{
            background:#dc3545;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border-radius:4px;
        }

        .btn-danger:hover{
            background:#c82333;
        }

    </style>
</head>
<body>

<div class="header">

    <h1>Mini Store Dashboard</h1>

    <div>

        {% if user.is_authenticated %}

            Welcome {{ user.username }}

            <a href="/accounts/logout/">
                Logout
            </a>

        {% else %}

            <a href="/accounts/login/">
                Login
            </a>

        {% endif %}

    </div>

</div>

<div class="sidebar">

    <a href="/">Dashboard</a>

    <a href="/products/">
        Products
    </a>

    <a href="/cart/">
        Cart
    </a>

    <a href="/orders/">
        Orders
    </a>

    {% comment %} <a class="btn-danger" href="/orders/">
    Back to Orders
    </a> {% endcomment %}

    {% comment %} <a href="/api/products/">
        Product API
    </a>

    <a href="/api/orders/">
        Order API
    </a>

    <a href="/admin/">
        Django Admin
    </a> {% endcomment %}

</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
